description = "Stress-test the plan with a grilling session, then synthesize into a PRD and vertical issues."
prompt = """
We are moving to the planning phase for {{args}}.

### Phase 1: Grilling Session
Activate the `grill-me` skill to challenge the plan against domain language and existing decisions.
- **Activate Skill**: `activate_skill("grill-me")`.
- **Interview**: Interview the user relentlessly to refine terminology.
- **Update**: Maintain `CONTEXT.md` and ADRs.

### Phase 2: Synthesis & Roadmap (Post-Grill)
Once the grilling session is complete and the domain is clear:
1. **Skill: `to-prd`**: Synthesize the conversation into a comprehensive PRD.
2. **Skill: `to-issues`**: Break the PRD into vertical "tracer bullet" slices (UI -> Bridge -> Agent Tool) on the issue tracker.

*User Request: {{args}}*
"""
